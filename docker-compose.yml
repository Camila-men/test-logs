services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - .:/var/www/html:cached
            - php_vendor:/var/www/html/vendor
            - php_var:/var/www/html/var
        depends_on:
            database:
                condition: service_healthy
        environment:
            DATABASE_URL: "mysql://app:app@database:3306/app?serverVersion=8.0&charset=utf8mb4"

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8081:80"
        volumes:
            - .:/var/www/html:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    database:
        image: mysql:8.0
        restart: unless-stopped
        command: ["--skip-name-resolve"]
        environment:
            MYSQL_DATABASE: app
            MYSQL_USER: app
            MYSQL_PASSWORD: app
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
            interval: 5s
            timeout: 5s
            retries: 20

volumes:
    db_data:
    php_vendor:
    php_var:
